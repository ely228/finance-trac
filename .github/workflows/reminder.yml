name: Напоминание внести траты

# Бесплатный способ получать push-уведомление на телефон без своего сервера:
# GitHub каждый день в заданное время дёргает ntfy.sh, а приложение ntfy
# на телефоне показывает уведомление, если подписано на этот "топик".
#
# Настройка (один раз, 2 минуты):
# 1. Поставь приложение ntfy: https://ntfy.sh/ (App Store / Google Play).
# 2. В приложении нажми "+" → Subscribe to topic → придумай уникальное
#    название топика, например "fintrac-напоминание-x7f3k9" (чем более
#    случайное — тем лучше: топики в ntfy.sh публичные по умолчанию,
#    и любой, кто знает название, может подписаться или отправить туда).
# 3. Впиши это же название вместо NTFY_TOPIC_HERE ниже.
# 4. Поменяй время в cron (сейчас 20:00 по Москве = 17:00 UTC).
# 5. Закоммить и запушь — с этого момента расписание работает само,
#    ничего дополнительно запускать не нужно.

on:
  schedule:
    - cron: '0 17 * * *'   # 17:00 UTC = 20:00 МСК. Поменяй под себя.
  workflow_dispatch: {}     # позволяет запустить вручную из вкладки Actions на GitHub

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Отправить push через ntfy.sh
        run: |
          curl -s \
            -H "Title: Fin Trac" \
            -H "Tags: money_with_wings" \
            -d "Не забудь внести сегодняшние траты 💸" \
            https://ntfy.sh/NTFY_TOPIC_HERE
