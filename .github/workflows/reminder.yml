name: Напоминание внести траты

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Отправить push через ntfy.sh
        run: |
          curl -s \
            -H "Title: Fin Trac" \
            -H "Tags: money_with_wings" \
            -d "Не забудь внести сегодняшние траты 💸" \
            https://ntfy.sh/NTFY_TOPIC_HERE
